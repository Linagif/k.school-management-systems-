{% extends 'base.html' %}

{% block title %}Add Marks - Teacher{% endblock %}

{% block sidebar %}
<li class="nav-item">
    <a class="nav-link" href="{% url 'teacher_dashboard' %}">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>
</li>
<li class="nav-item">
    <a class="nav-link" href="{% url 'teacher_students' %}">
        <i class="bi bi-people"></i> Students
    </a>
</li>
<li class="nav-item">
    <a class="nav-link active" href="{% url 'teacher_add_marks' %}">
        <i class="bi bi-plus-circle"></i> Add Marks
    </a>
</li>
<li class="nav-item">
    <a class="nav-link" href="{% url 'teacher_view_marks' %}">
        <i class="bi bi-clipboard-data"></i> View Marks
    </a>
</li>
{% endblock %}

{% block content %}
<h1 class="mb-4 text-white"><i class="bi bi-plus-circle"></i> Add Student Marks</h1>

<div class="card">
    <div class="card-header">
        <i class="bi bi-pencil-square"></i> Enter Marks Details
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="student" class="form-label">Select Student</label>
                    <select class="form-select" id="student" name="student" required>
                        <option value="">Choose a student...</option>
                        {% for student in students %}
                        <option value="{{ student.id }}">{{ student.user.get_full_name }} ({{ student.admission_number }})</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="subject" class="form-label">Select Subject</label>
                    <select class="form-select" id="subject" name="subject" required>
                        <option value="">Choose a subject...</option>
                        {% for subject in subjects %}
                        <option value="{{ subject.id }}">{{ subject.name }} ({{ subject.code }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="term" class="form-label">Term</label>
                    <select class="form-select" id="term" name="term" required>
                        <option value="">Select term...</option>
                        <option value="1">Term 1</option>
                        <option value="2">Term 2</option>
                        <option value="3">Term 3</option>
                    </select>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="year" class="form-label">Year</label>
                    <input type="number" class="form-control" id="year" name="year" 
                           value="2024" min="2020" max="2030" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="marks_obtained" class="form-label">Marks Obtained</label>
                    <input type="number" class="form-control" id="marks_obtained" name="marks_obtained" 
                           step="0.01" min="0" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="total_marks" class="form-label">Total Marks</label>
                    <input type="number" class="form-control" id="total_marks" name="total_marks" 
                           value="100" step="0.01" min="1" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="remarks" class="form-label">Remarks (Optional)</label>
                <textarea class="form-control" id="remarks" name="remarks" rows="3" 
                          placeholder="Enter any additional comments..."></textarea>
            </div>
            
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="reset" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Reset
                </button>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Submit Marks
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
