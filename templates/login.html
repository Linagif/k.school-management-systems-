{% extends 'base.html' %}

{% block title %}Login - School Management System{% endblock %}

{% block login_content %}
<div class="row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-mortarboard-fill" style="font-size: 4rem; color: #667eea;"></i>
                    <h2 class="mt-3">School Management System</h2>
                    <p class="text-muted">Please login to continue</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </form>
                
                <div class="mt-4 text-center">
                    <p class="mb-2">
                        Don't have an account? 
                        <a href="{% url 'signup' %}" style="color: #667eea; text-decoration: none; font-weight: bold;">Sign up here</a>
                    </p>
                    <small class="text-muted">
                        <i class="bi bi-info-circle"></i> Contact administrator for login credentials
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
